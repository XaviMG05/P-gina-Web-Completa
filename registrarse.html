<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter-Strike 2</title>
  <link rel="stylesheet" href="css/registrarse.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1 class="logo">COUNTER-STRIKE 2</h1>
    <nav>
      <a href="principal.html">Inicio</a>
      <a href="juego.html">Juego</a>
      <a href="actualizaciones.html">Actualizaciones</a>
      <a href="armas.html">Armas</a>
      <a href="esports.html">Esports</a>
      <a class="play" href="#">REGISTRARSE</a>
    </nav>
  </header>

    <main>
  <section class="formulario">
          <h2 class="section-title">CREAR CUENTA</h2>
          <p class="section-sub">Únete a la comunidad</p>

          <form class="form-contacto">
            <input type="text" placeholder="Nombre de usuario" required>
            <input type="password" placeholder="Contraseña" required>
            <input type="email" placeholder="Correo electrónico" required>

            <div class="genero">
              <span class="genero-label">Género</span>
              <div class="genero-opciones">
                <label>
                  <input type="radio" name="genero" value="hombre"> Hombre
                </label>
                <label>
                  <input type="radio" name="genero" value="mujer"> Mujer
                </label>
                <label>
                  <input type="radio" name="genero" value="otro"> Otro
                </label>
              </div>
            </div>
            <select name="servidor" required>
              <option value="" disabled selected>-- Selecciona tu servidor --</option>
              <option value="europa">Europa</option>
              <option value="africa">África</option>
              <option value="asia">Asia</option>
              <option value="na">NA (Norte América)</option>
              <option value="sa">SA (Sudamérica)</option>
              <option value="oceania">Oceanía</option>
            </select>
            <button type="submit">REGISTRARSE</button>
          </form>
  </section>
    </main>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Counter-Strike 2 Fan Page Replica</p>
  </footer>

</body>
</html>
